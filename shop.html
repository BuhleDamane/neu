<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shop All — Néu</title>
<link rel="stylesheet" href="styles.css" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>
</head>
<body>

<div id="site-header" data-active="products"></div>

<main class="container section-tight">

  <div class="breadcrumb">
    <span>Home</span>
    <span>/</span>
    <span id="crumb-current" style="color:var(--color-fg);font-weight:600;">Shop All</span>
  </div>

  <h1 style="font-size:clamp(1.8rem,3vw,2.4rem);margin-bottom:var(--space-5);" id="page-title">Shop All</h1>

  <button class="filters-mobile-head" id="filters-mobile-toggle">
    <span style="display:flex;align-items:center;gap:var(--space-2);">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line><line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line><line x1="2" y1="14" x2="6" y2="14"></line><line x1="10" y1="8" x2="14" y2="8"></line><line x1="18" y1="16" x2="22" y2="16"></line></svg>
      Filter
    </span>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
  </button>

  <div class="shop-layout">
    <aside class="filters" id="filters-panel">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-2);">
        <strong style="font-size:.78rem;text-transform:uppercase;letter-spacing:.04em;">Filter</strong>
        <button class="icon-btn" id="filters-mobile-close" style="display:none;" aria-label="Close filters">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>

      <div class="filter-group" data-group>
        <div class="filter-group-head" data-group-toggle>
          Category
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>
        <div class="filter-group-body" id="category-filters"></div>
      </div>

      <div class="filter-group" data-group>
        <div class="filter-group-head" data-group-toggle>
          Price
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>
        <div class="filter-group-body" id="price-filters">
          <div class="filter-row selected" data-price="all"><span class="box"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg></span>All prices</div>
          <div class="filter-row" data-price="0-800"><span class="box"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg></span>Under R800</div>
          <div class="filter-row" data-price="800-1800"><span class="box"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg></span>R800 to R1800</div>
          <div class="filter-row" data-price="1800-3000"><span class="box"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg></span>R1800 to R3000</div>
          <div class="filter-row" data-price="3000-99999"><span class="box"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg></span>Above R3000</div>
        </div>
      </div>

      <div class="filter-group" data-group>
        <div class="filter-group-head" data-group-toggle>
          Fit
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>
        <div class="filter-group-body">
          <div class="filter-row" id="unisex-chip"><span class="box"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg></span>Unisex only</div>
          <div class="filter-row" id="sale-chip"><span class="box"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg></span>On sale</div>
        </div>
      </div>

      <span class="clear-filters-link" id="clear-filters">Clear all filters</span>
    </aside>

    <div>
      <div class="shop-toolbar">
        <span class="result-count" id="result-count"></span>
        <div class="sort-dropdown" id="sort-dropdown">
          <button class="sort-trigger" id="sort-trigger" type="button">
            <span id="sort-label">Sort: Featured</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </button>
          <div class="sort-panel" id="sort-panel">
            <div class="sort-option active" data-sort="featured"><span>Featured</span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
            <div class="sort-option" data-sort="new"><span>Newest</span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
            <div class="sort-option" data-sort="price-asc"><span>Price: Low to High</span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
            <div class="sort-option" data-sort="price-desc"><span>Price: High to Low</span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
            <div class="sort-option" data-sort="name-asc"><span>Name: A to Z</span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
          </div>
        </div>
      </div>
      <div class="product-grid" id="shop-grid"></div>
    </div>
  </div>

</main>

<footer class="site-footer" id="site-footer"></footer>

<script src="products-data.js"></script>
<script src="header.js"></script>
<script src="footer.js"></script>
<script src="script.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  let activeCategory = params.get('category') || 'all';
  let activePrice = 'all';
  let unisexOnly = false;
  let saleOnly = params.get('sale') === 'true';
  let searchQuery = (params.get('search') || '').toLowerCase().trim();
  let sortMode = params.get('sort') === 'new' ? 'new' : 'featured';

  const sortLabels = {
    featured: 'Sort: Featured',
    new: 'Sort: Newest',
    'price-asc': 'Sort: Price (Low to High)',
    'price-desc': 'Sort: Price (High to Low)',
    'name-asc': 'Sort: Name (A–Z)',
  };

  function setPageTitle() {
    let title = activeCategory === 'all' ? 'Shop All' : activeCategory;
    if (saleOnly) title = 'Sale';
    if (searchQuery) title = `Search results for "${searchQuery}"`;
    document.getElementById('page-title').textContent = title;
    document.getElementById('crumb-current').textContent = title;
    document.title = title + ' — Néu';
  }

  function renderCategoryFilters() {
    const el = document.getElementById('category-filters');
    const row = (value, label) => `<div class="filter-row ${activeCategory === value ? 'selected' : ''}" data-cat="${value}"><span class="box"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg></span>${label}</div>`;
    el.innerHTML = row('all', 'All Categories') + CATEGORIES.map(c => row(c, c)).join('');
    el.querySelectorAll('.filter-row').forEach(c => {
      c.addEventListener('click', () => {
        activeCategory = c.dataset.cat;
        searchQuery = '';
        el.querySelectorAll('.filter-row').forEach(x => x.classList.remove('selected'));
        c.classList.add('selected');
        setPageTitle();
        applyFilters();
      });
    });
  }

  function applyFilters() {
    let list = [...PRODUCTS];
    if (searchQuery) {
      list = list.filter(p =>
        p.name.toLowerCase().includes(searchQuery) ||
        p.category.toLowerCase().includes(searchQuery) ||
        (p.subcategory && p.subcategory.toLowerCase().includes(searchQuery))
      );
    }
    if (activeCategory !== 'all') list = list.filter(p => p.category === activeCategory);
    if (activePrice !== 'all') {
      const [min, max] = activePrice.split('-').map(Number);
      list = list.filter(p => {
        const effectivePrice = (typeof p.salePrice === 'number') ? p.salePrice : p.price;
        return effectivePrice >= min && effectivePrice <= max;
      });
    }
    if (unisexOnly) list = list.filter(p => p.unisex);
    if (saleOnly) list = list.filter(p => typeof p.salePrice === 'number' && p.salePrice < p.price);

    if (sortMode === 'price-asc') list.sort((a,b) => (a.salePrice ?? a.price) - (b.salePrice ?? b.price));
    else if (sortMode === 'price-desc') list.sort((a,b) => (b.salePrice ?? b.price) - (a.salePrice ?? a.price));
    else if (sortMode === 'name-asc') list.sort((a,b) => a.name.localeCompare(b.name));
    else if (sortMode === 'new') list = list.filter(p => p.tag === 'New' || p.tag === 'Limited').concat(list.filter(p => !(p.tag === 'New' || p.tag === 'Limited')));

    document.getElementById('result-count').textContent = `${list.length} item${list.length !== 1 ? 's' : ''}`;
    renderProductGrid(document.getElementById('shop-grid'), list);
  }

  document.querySelectorAll('#price-filters .filter-row').forEach(row => {
    row.addEventListener('click', () => {
      document.querySelectorAll('#price-filters .filter-row').forEach(c => c.classList.remove('selected'));
      row.classList.add('selected');
      activePrice = row.dataset.price;
      applyFilters();
    });
  });
  document.getElementById('unisex-chip').addEventListener('click', function () {
    unisexOnly = !unisexOnly;
    this.classList.toggle('selected', unisexOnly);
    applyFilters();
  });
  document.getElementById('sale-chip').addEventListener('click', function () {
    saleOnly = !saleOnly;
    this.classList.toggle('selected', saleOnly);
    setPageTitle();
    applyFilters();
  });

  document.getElementById('clear-filters').addEventListener('click', () => {
    activeCategory = 'all'; activePrice = 'all'; unisexOnly = false; saleOnly = false; searchQuery = ''; sortMode = 'featured';
    document.getElementById('sort-label').textContent = sortLabels.featured;
    document.querySelectorAll('.sort-option').forEach(o => o.classList.toggle('active', o.dataset.sort === 'featured'));
    document.getElementById('unisex-chip').classList.remove('selected');
    document.getElementById('sale-chip').classList.remove('selected');
    document.querySelectorAll('#price-filters .filter-row').forEach(c => c.classList.remove('selected'));
    document.querySelector('#price-filters .filter-row[data-price="all"]').classList.add('selected');
    setPageTitle();
    renderCategoryFilters();
    applyFilters();
  });

  // Per-group collapse toggles (SHEIN-style)
  document.querySelectorAll('[data-group-toggle]').forEach(head => {
    head.addEventListener('click', () => {
      head.closest('[data-group]').classList.toggle('collapsed');
    });
  });

  // Mobile filter panel open/close
  const filtersPanel = document.getElementById('filters-panel');
  const mobileToggle = document.getElementById('filters-mobile-toggle');
  const mobileClose = document.getElementById('filters-mobile-close');
  mobileToggle.addEventListener('click', () => {
    filtersPanel.classList.add('mobile-open');
    mobileClose.style.display = 'inline-flex';
  });
  mobileClose.addEventListener('click', () => filtersPanel.classList.remove('mobile-open'));

  // Custom sort dropdown
  const sortDropdown = document.getElementById('sort-dropdown');
  const sortTrigger = document.getElementById('sort-trigger');
  sortTrigger.addEventListener('click', () => sortDropdown.classList.toggle('open'));
  document.querySelectorAll('.sort-option').forEach(opt => {
    opt.addEventListener('click', () => {
      sortMode = opt.dataset.sort;
      document.getElementById('sort-label').textContent = sortLabels[sortMode];
      document.querySelectorAll('.sort-option').forEach(o => o.classList.remove('active'));
      opt.classList.add('active');
      sortDropdown.classList.remove('open');
      applyFilters();
    });
  });
  document.addEventListener('click', (e) => {
    if (!sortDropdown.contains(e.target)) sortDropdown.classList.remove('open');
  });

  if (saleOnly) {
    document.getElementById('sale-chip').classList.add('selected');
    setTimeout(() => {
      const saleLink = document.querySelector('#site-header a[href*="sale=true"]');
      if (saleLink) saleLink.classList.add('active');
    }, 0);
  }
  if (sortMode !== 'featured') {
    document.getElementById('sort-label').textContent = sortLabels[sortMode];
    document.querySelectorAll('.sort-option').forEach(o => o.classList.toggle('active', o.dataset.sort === sortMode));
  }

  setPageTitle();
  renderCategoryFilters();
  applyFilters();
</script>
</body>
</html>
